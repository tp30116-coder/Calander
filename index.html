<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉藍行事曆 - 全自動月份版</title>
    <style>
        :root {
            --primary-blue: #a2d2ff;
            --dark-blue: #5a8fb9;
            --bg-light: #f0f7ff;
            --card-white: #ffffff;
            --accent-pink: #ffafcc;
            --text-main: #445a6d;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: #d0e4f5;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .phone-shell {
            width: 375px; height: 780px;
            background: var(--bg-light); border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
            border: 8px solid #fff;
        }

        /* 分頁標籤 */
        .nav-tabs {
            display: flex; background: var(--card-white);
            padding: 15px 0 5px; z-index: 10;
        }
        .nav-item {
            flex: 1; text-align: center; padding: 10px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #b0c4d8;
        }
        .nav-item.active { color: var(--dark-blue); position: relative; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: 0; left: 30%; width: 40%; height: 3px;
            background: var(--primary-blue); border-radius: 10px;
        }

        .main-content { flex: 1; overflow-y: auto; display: none; padding: 15px; }
        .main-content.active { display: block; }

        /* 月份切換標題 */
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: 10px 0; padding: 0 10px;
        }
        .month-title { font-size: 1.2rem; font-weight: bold; color: var(--dark-blue); }
        .nav-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--dark-blue); padding: 5px 10px; }

        .calendar-box { background: var(--card-white); border-radius: 20px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .grid-header { font-size: 0.7rem; color: var(--primary-blue); padding: 5px 0; font-weight: bold; }
        
        .date-cell {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.85rem; border-radius: 12px; cursor: pointer; position: relative; transition: 0.2s;
        }
        .date-cell:hover { background: #f0f7ff; }
        .date-cell.selected { background: var(--primary-blue); color: white; font-weight: bold; }
        .date-cell.today-circle { border: 1.5px solid var(--accent-pink); }
        .dot { width: 5px; height: 5px; background: var(--accent-pink); border-radius: 50%; position: absolute; bottom: 6px; }

        /* 下方詳情區 */
        .day-detail-panel {
            margin-top: 15px; background: white; border-radius: 20px; padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .detail-item {
            padding: 8px 0; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; font-size: 0.9rem;
        }

        .task-card {
            background: white; padding: 15px; border-radius: 18px;
            margin-bottom: 12px; border-left: 5px solid var(--primary-blue);
            display: flex; justify-content: space-between; align-items: center;
        }

        .add-btn {
            position: absolute; bottom: 30px; right: 25px;
            width: 55px; height: 55px; background: var(--primary-blue);
            color: white; border-radius: 50%; border: none; font-size: 28px;
            box-shadow: 0 8px 20px rgba(162, 210, 255, 0.4); cursor: pointer; z-index: 100;
        }

        .modal {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-card { background: white; width: 80%; padding: 25px; border-radius: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 12px; background: var(--primary-blue); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="nav-tabs">
        <div class="nav-item active" onclick="switchTab('cal', this)">全月行事曆</div>
        <div class="nav-item" onclick="switchTab('list', this)">截止日期排序</div>
    </div>

    <div id="page-cal" class="main-content active">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <div class="month-title" id="month-display">2026年 5月</div>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
        
        <div class="calendar-box">
            <div class="grid-7">
                <div class="grid-header">日</div><div class="grid-header">一</div><div class="grid-header">二</div>
                <div class="grid-header">三</div><div class="grid-header">四</div><div class="grid-header">五</div>
                <div class="grid-header">六</div>
            </div>
            <div class="grid-7" id="calendar-body"></div>
        </div>

        <div class="day-detail-panel">
            <div style="font-weight: bold; margin-bottom: 10px; color: var(--dark-blue);" id="detail-date-title">請選擇日期</div>
            <div id="detail-items-container"></div>
        </div>
    </div>

    <div id="page-list" class="main-content">
        <div id="sorted-list-container"></div>
    </div>

    <button class="add-btn" onclick="toggleModal(true)">+</button>

    <div class="modal" id="add-modal">
        <div class="modal-card">
            <h3 style="margin-top:0; color:var(--dark-blue)">新增工作項目</h3>
            <input type="text" id="task-input" placeholder="活動名稱">
            <input type="date" id="date-input">
            <button class="save-btn" onclick="addTask()">儲存</button>
            <button class="save-btn" style="background:#ccc" onclick="toggleModal(false)">取消</button>
        </div>
    </div>
</div>

<script>
    let myTasks = []; 
    // 初始化日期：設定為今天
    let currentViewDate = new Date(); 
    let selectedDateStr = formatDate(new Date());

    function switchTab(type, element) {
        document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + type).classList.add('active');
        element.classList.add('active');
        if(type === 'list') renderSortedList();
    }

    function changeMonth(step) {
        currentViewDate.setMonth(currentViewDate.getMonth() + step);
        renderCalendar();
    }

    function formatDate(date) {
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, '0') + "-" + String(date.getDate()).padStart(2, '0');
    }

    function addTask() {
        const title = document.getElementById('task-input').value;
        const date = document.getElementById('date-input').value;
        if (title && date) {
            myTasks.push({ id: Date.now(), title, date });
            document.getElementById('task-input').value = '';
            toggleModal(false);
            renderAll();
            selectDate(date);
        }
    }

    function deleteTask(id) {
        if(confirm("確定刪除？")) {
            myTasks = myTasks.filter(t => t.id !== id);
            renderAll();
            selectDate(selectedDateStr);
        }
    }

    function selectDate(dateStr) {
        selectedDateStr = dateStr;
        renderCalendar();
        document.getElementById('detail-date-title').innerText = dateStr + " 的事項";
        const container = document.getElementById('detail-items-container');
        const dayTasks = myTasks.filter(t => t.date === dateStr);
        container.innerHTML = dayTasks.length ? dayTasks.map(t => `
            <div class="detail-item">
                <span>${t.title}</span>
                <button style="border:none; background:none; color:#ff8b8b; cursor:pointer;" onclick="deleteTask(${t.id})">刪除</button>
            </div>`).join('') : '<p style="color:#ccc; font-size:0.8rem;">這天沒事喔！</p>';
    }

    function renderCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('month-display').innerText = `${year}年 ${month + 1}月`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';

        for (let i = 0; i < firstDay; i++) body.innerHTML += '<div></div>';

        const todayStr = formatDate(new Date());

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const hasTask = myTasks.some(t => t.date === dateStr);
            const isSelected = (dateStr === selectedDateStr) ? 'selected' : '';
            const isToday = (dateStr === todayStr) ? 'today-circle' : '';
            
            body.innerHTML += `
                <div class="date-cell ${isSelected} ${isToday}" onclick="selectDate('${dateStr}')">
                    ${d}
                    ${hasTask ? '<div class="dot"></div>' : ''}
                </div>`;
        }
    }

    function renderSortedList() {
        const container = document.getElementById('sorted-list-container');
        const sorted = [...myTasks].sort((a, b) => new Date(a.date) - new Date(b.date));
        container.innerHTML = sorted.length ? sorted.map(t => `
            <div class="task-card">
                <div>
                    <div style="font-weight:bold">${t.title}</div>
                    <div style="font-size:0.75rem; color:#99abbd; margin-top:4px;">📅 ${t.date}</div>
                </div>
                <button style="border:none; background:none; color:#ddd; font-size:1.2rem; cursor:pointer;" onclick="deleteTask(${t.id})">×</button>
            </div>`).join('') : '<p style="text-align:center; color:#b0c4d8; margin-top:50px;">還沒有任何事項喔！</p>';
    }

    function toggleModal(show) { 
        document.getElementById('add-modal').classList.toggle('active', show); 
        if(show) document.getElementById('date-input').value = selectedDateStr;
    }
    
    function renderAll() { renderCalendar(); renderSortedList(); }
    
    renderAll();
    selectDate(selectedDateStr);
</script>

</body>
</html>
