<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉藍簡約行事曆 v4 - 文字預覽版</title>
    <style>
        :root {
            --primary-blue: #a2d2ff;
            --dark-blue: #5a8fb9;
            --bg-light: #f0f7ff;
            --card-white: #ffffff;
            --accent-pink: #ffafcc;
            --text-main: #445a6d;
            --danger-red: #ff8b8b;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #d0e4f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-shell {
            width: 375px;
            height: 750px;
            background: var(--bg-light);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #fff;
            position: relative;
        }

        .nav-tabs {
            display: flex;
            background: var(--card-white);
            padding: 15px 0 5px;
            z-index: 10;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: #b0c4d8;
        }

        .nav-item.active {
            color: var(--dark-blue);
            position: relative;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 30%; width: 40%; height: 3px;
            background: var(--primary-blue);
            border-radius: 10px;
        }

        .main-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: none;
        }

        .main-content.active { display: block; }

        /* 月曆優化：文字預覽 */
        .month-title { text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--dark-blue); }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #e0ecf8;
            border: 1px solid #e0ecf8;
            border-radius: 12px;
            overflow: hidden;
        }

        .grid-header {
            background: var(--card-white);
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--primary-blue);
            padding: 8px 0;
            text-align: center;
        }

        .date-cell {
            background: var(--card-white);
            min-height: 75px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .date-cell:hover { background: #f9fcff; }

        .date-num { margin-bottom: 4px; font-weight: 500; }
        .date-cell.today .date-num {
            background: var(--primary-blue);
            color: white;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .task-label {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            font-size: 0.6rem;
            padding: 2px 4px;
            margin-bottom: 2px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-sizing: border-box;
        }

        .task-label.pink { background: var(--accent-pink); }

        /* 列表樣式 */
        .task-item {
            background: var(--card-white);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* 浮動按鈕與彈窗 */
        .add-btn {
            position: absolute;
            bottom: 25px; right: 25px;
            width: 50px; height: 50px;
            background: var(--primary-blue);
            color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: none; z-index: 100;
            box-shadow: 0 5px 15px rgba(162, 210, 255, 0.4);
        }

        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-card { background: white; width: 80%; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .modal-card input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 10px; background: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="nav-tabs">
        <div class="nav-item active" onclick="switchTab('cal', this)">月記事</div>
        <div class="nav-item" onclick="switchTab('list', this)">排序清單</div>
    </div>

    <div id="page-cal" class="main-content active">
        <div class="month-title">2026年 5月</div>
        <div class="calendar-grid" id="calendar-grid">
            <div class="grid-header">日</div><div class="grid-header">一</div><div class="grid-header">二</div>
            <div class="grid-header">三</div><div class="grid-header">四</div><div class="grid-header">五</div>
            <div class="grid-header">六</div>
        </div>
    </div>

    <div id="page-list" class="main-content">
        <div id="sorted-tasks-container"></div>
    </div>

    <button class="add-btn" onclick="openAddModal()">+</button>

    <div class="modal" id="add-modal">
        <div class="modal-card">
            <h3 style="margin-top:0; color:var(--dark-blue)">新增記事</h3>
            <input type="text" id="task-input" placeholder="要做什麼呢？">
            <input type="date" id="date-input">
            <button class="save-btn" onclick="addTask()">儲存</button>
            <button class="save-btn" style="background:#ccc" onclick="toggleModal(false)">取消</button>
        </div>
    </div>
</div>

<script>
    let myTasks = [
        { id: 1, title: "繳電費", date: "2026-05-05" },
        { id: 2, title: "看牙醫", date: "2026-05-05" },
        { id: 3, title: "專案會議", date: "2026-05-12" }
    ];

    function switchTab(type, element) {
        document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + type).classList.add('active');
        element.classList.add('active');
    }

    function toggleModal(show, date = "2026-05-03") {
        document.getElementById('add-modal').classList.toggle('active', show);
        if(show) document.getElementById('date-input').value = date;
    }

    function openAddModal(date) {
        toggleModal(true, date);
    }

    function addTask() {
        const title = document.getElementById('task-input').value;
        const date = document.getElementById('date-input').value;
        if (title && date) {
            myTasks.push({ id: Date.now(), title, date });
            document.getElementById('task-input').value = '';
            toggleModal(false);
            renderAll();
        }
    }

    function deleteTask(id) {
        if(confirm("要刪除嗎？")) {
            myTasks = myTasks.filter(t => t.id !== id);
            renderAll();
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        // 保留標題頭部
        const headers = Array.from(grid.querySelectorAll('.grid-header'));
        grid.innerHTML = '';
        headers.forEach(h => grid.appendChild(h));

        const startOffset = 5; 
        const daysInMonth = 31;
        const todayNum = 3; 

        for (let i = 0; i < startOffset; i++) {
            const empty = document.createElement('div');
            empty.className = 'date-cell';
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `2026-05-${String(d).padStart(2, '0')}`;
            const cellTasks = myTasks.filter(t => t.date === dateStr);
            
            const cell = document.createElement('div');
            cell.className = `date-cell ${d === todayNum ? 'today' : ''}`;
            cell.onclick = () => openAddModal(dateStr);
            
            cell.innerHTML = `<div class="date-num">${d}</div>`;
            
            cellTasks.forEach((t, idx) => {
                const label = document.createElement('div');
                label.className = `task-label ${idx % 2 === 0 ? '' : 'pink'}`;
                label.innerText = t.title;
                cell.appendChild(label);
            });

            grid.appendChild(cell);
        }
    }

    function renderSortedTasks() {
        const container = document.getElementById('sorted-tasks-container');
        const sorted = [...myTasks].sort((a, b) => new Date(a.date) - new Date(b.date));
        container.innerHTML = sorted.map(t => `
            <div class="task-item">
                <div>
                    <div style="font-weight:bold">${t.title}</div>
                    <div style="font-size:0.7rem; color:#99a">${t.date}</div>
                </div>
                <button style="border:none; background:none; color:#ccc; cursor:pointer" onclick="deleteTask(${t.id})">×</button>
            </div>
        `).join('');
    }

    function renderAll() { renderCalendar(); renderSortedTasks(); }
    renderAll();
</script>

</body>
</html>
