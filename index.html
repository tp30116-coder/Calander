<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉藍簡約行事曆 v2</title>
    <style>
        :root {
            --primary-blue: #a2d2ff;
            --dark-blue: #5a8fb9;
            --bg-light: #f0f7ff;
            --card-white: #ffffff;
            --accent-pink: #ffafcc;
            --text-main: #445a6d;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #d0e4f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-shell {
            width: 360px;
            height: 680px;
            background: var(--bg-light);
            border-radius: 45px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #fff;
            position: relative;
        }

        .nav-tabs {
            display: flex;
            background: var(--card-white);
            padding: 15px 0 5px;
            z-index: 10;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: #b0c4d8;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--dark-blue);
            position: relative;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 30%;
            width: 40%;
            height: 3px;
            background: var(--primary-blue);
            border-radius: 10px;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .main-content.active { display: block; }

        /* 月曆樣式 */
        .month-title { text-align: center; font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; color: var(--dark-blue); }
        .calendar-box { background: var(--card-white); border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(162, 210, 255, 0.2); }
        .grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .grid-header { font-size: 0.75rem; font-weight: bold; color: var(--primary-blue); padding-bottom: 10px; }
        .date-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; border-radius: 10px; position: relative; }
        .date-cell.today { background: var(--primary-blue); color: white; font-weight: bold; }
        .dot { width: 5px; height: 5px; background: var(--accent-pink); border-radius: 50%; position: absolute; bottom: 4px; }

        /* 任務列表樣式 */
        .task-item {
            background: var(--card-white);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            border-left: 5px solid var(--primary-blue);
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-body { flex: 1; }
        .task-title { font-size: 0.95rem; font-weight: 600; }
        .task-date { font-size: 0.75rem; color: #99abbd; margin-top: 4px; }

        /* 浮動新增按鈕 */
        .add-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: var(--primary-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 20px rgba(162, 210, 255, 0.5);
            cursor: pointer;
            border: none;
            z-index: 100;
        }

        /* 輸入視窗彈出層 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-card {
            background: white;
            width: 80%;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-sizing: border-box;
            background: var(--bg-light);
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
